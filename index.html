<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PageAgent UI 测试</title>
    <style>
      /* 干净重置 + 柔和基调 */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          "PingFang SC",
          "Microsoft YaHei",
          sans-serif;
        background: #f4f7fc;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
      }

      /* 简约卡片，清爽留白 */
      .card {
        max-width: 600px;
        width: 100%;
        background: white;
        border-radius: 28px;
        box-shadow:
          0 8px 24px rgba(0, 0, 0, 0.05),
          0 2px 4px rgba(0, 0, 0, 0.02);
        padding: 2rem 2rem 2rem 2rem;
        transition: box-shadow 0.2s;
      }

      /* 标题区域 */
      h1 {
        font-size: 1.75rem;
        font-weight: 600;
        color: #1a3b4c;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 0.5rem;
      }

      .desc {
        color: #5b6f7c;
        font-size: 0.9rem;
        margin-top: 1rem;
        margin-bottom: 1.8rem;
        padding-left: 8px;
        border-left: 3px solid #b8d4e3;
      }

      /* 表单标题 */
      .form-title {
        font-size: 1.2rem;
        font-weight: 500;
        color: #2c5a6e;
        margin-bottom: 1.2rem;
      }

      /* 表单布局 - 干净易读 */
      .test-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      /* 每个字段组 */
      .field-row {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 0.75rem;
      }

      .field-row label {
        width: 70px;
        font-weight: 500;
        color: #2c5a6e;
        font-size: 0.9rem;
      }

      .field-row input {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid #d4e2ec;
        border-radius: 16px;
        font-size: 0.9rem;
        font-family: inherit;
        background: #ffffff;
        transition: all 0.2s ease;
        outline: none;
        color: #1f3e4c;
      }

      .field-row input:focus {
        border-color: #83b8cf;
        box-shadow: 0 0 0 3px rgba(131, 184, 207, 0.15);
      }

      .field-row input::placeholder {
        color: #c2d6e4;
        font-weight: 400;
      }

      /* 按钮区域 */
      .btn-wrap {
        margin-top: 1.3rem;
        display: flex;
        justify-content: flex-start;
      }

      .submit-btn {
        background: #2c6e8f;
        border: none;
        padding: 10px 28px;
        border-radius: 40px;
        font-weight: 500;
        font-size: 0.9rem;
        color: white;
        cursor: default; /* 纯UI，无交互 */
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: inherit;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        transition: opacity 0.1s;
      }

      /* 提示区 */
      .info-tip {
        margin-top: 2rem;
        background: #eef3f8;
        border-radius: 20px;
        padding: 0.85rem 1.2rem;
        font-size: 0.8rem;
        color: #2e6a80;
        display: flex;
        align-items: center;
        gap: 12px;
        border: 1px solid #e0ecf3;
      }

      .info-tip span {
        font-size: 1.2rem;
      }

      /* 移动端适配 */
      @media (max-width: 500px) {
        .card {
          padding: 1.5rem;
        }
        .field-row {
          flex-direction: column;
          gap: 0.25rem;
        }
        .field-row label {
          width: auto;
          font-size: 0.85rem;
        }
        .btn-wrap {
          justify-content: center;
        }
      }

      /* 隐藏挂载点，仅用于占位兼容 */
      #app {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h3><span>🧪</span> PageAgent 测试页面</h3>
      <div class="desc">验证 AI 助手能否正常工作 · 清爽界面</div>

      <div class="form-title">📝 测试表单</div>
      <form class="test-form" id="testForm">
        <div class="field-row">
          <label>姓名：</label>
          <input type="text" name="name" placeholder="请输入姓名" />
        </div>
        <div class="field-row">
          <label>年龄：</label>
          <input type="number" name="age" placeholder="请输入年龄" />
        </div>
        <div class="field-row">
          <label>手机号：</label>
          <input type="tel" name="phone" placeholder="请输入手机号" />
        </div>
        <div class="field-row">
          <label>邮箱：</label>
          <input type="email" name="email" placeholder="请输入邮箱" />
        </div>
        <div class="field-row">
          <label>职业：</label>
          <input type="text" name="job" placeholder="请输入职业" />
        </div>
        <div class="btn-wrap">
          <button type="button" class="submit-btn">提交</button>
        </div>
      </form>

      <div class="info-tip">
        <span>💡</span>
        <span
          >点击右下角的 AI 助手，输入任务如 "帮我填写表单"
          即可测试自动填充能力</span
        >
      </div>
    </div>
    <!-- ✅ Vue 应用会挂载到这里 -->
    <div id="app"></div>
    <script type="module" src="./dist/agent.js"></script>
  </body>
</html>
